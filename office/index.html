<!DOCTYPE html>
<!-- ABU OFFICE v2 — ISOMETRIC pixel office PWA (2026-07-12).
     Изометрия как на референсах: комнаты, кабинет, кухня, лаунж, перегородки.
     Реальный движок: /health = свет, задание → /chat (business:flowbox). -->
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>ABU Office</title>
<meta name="description" content="Изометрический пиксельный офис ABU AI — дай задание, и агенты его выполнят.">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#05070D">
<style>
:root{--bg:#05070D;--panel:#0C1220;--line:rgba(148,170,210,.16);--ink:#F2F5FB;--mut:#93A0B8;
--blue:#4F7CFF;--cyan:#22D3EE;--ok:#34D399;--warn:#FBBF24}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;
display:flex;flex-direction:column;overflow:hidden;-webkit-tap-highlight-color:transparent}
header{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--line);flex:none}
header b{font-size:15px;letter-spacing:.06em}
#cfg{background:none;border:1px solid var(--line);border-radius:9px;color:var(--mut);font-size:14px;
padding:4px 9px;cursor:pointer;margin-left:6px}
header .st{font-size:11.5px;font-weight:700;margin-left:auto;display:flex;align-items:center;gap:6px}
header .st i{width:8px;height:8px;border-radius:50%;background:var(--warn);display:inline-block}
header .st.on i{background:var(--ok);box-shadow:0 0 8px var(--ok)}
#stage{flex:1;display:grid;place-items:center;min-height:0;padding:6px;position:relative;background:
radial-gradient(120% 100% at 50% 0,#0A1120,#05070D 70%)}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;height:100%;width:auto;max-width:100%;
border:1px solid var(--line);border-radius:10px;background:#080B12}
#hud{flex:none;border-top:1px solid var(--line);background:var(--panel);padding:9px 12px calc(9px + env(safe-area-inset-bottom))}
#chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
#chips::-webkit-scrollbar{display:none}
#chips button{flex:none;background:rgba(79,124,255,.12);border:1px solid rgba(79,124,255,.3);color:var(--ink);
font:600 12px 'Segoe UI';border-radius:99px;padding:8px 12px;cursor:pointer}
#row{display:flex;gap:8px}
#task{flex:1;background:rgba(5,7,13,.7);border:1px solid var(--line);border-radius:11px;color:var(--ink);
font:500 16px 'Segoe UI';padding:10px 13px;outline:0;min-width:0}
#task:focus{border-color:var(--blue)}
#send{background:linear-gradient(100deg,var(--blue),var(--cyan));border:0;border-radius:11px;width:50px;
cursor:pointer;font-size:17px;color:#04101E;font-weight:800;flex:none}
#log{max-height:96px;overflow-y:auto;font-size:12.5px;color:var(--mut);line-height:1.5;margin-top:8px;
border-top:1px dashed var(--line);padding-top:6px;white-space:pre-wrap;scrollbar-width:thin}
#log b{color:var(--cyan)} #log .me{color:var(--ink)}
#boot{position:absolute;inset:0;background:rgba(4,6,12,.9);backdrop-filter:blur(6px);z-index:10;
display:flex;align-items:center;justify-content:center;padding:16px}
#boot.hide{display:none}
.bcard{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px 20px;width:min(360px,100%)}
.bcard h2{font-size:18px;letter-spacing:.05em;margin-bottom:4px}
.bcard p{font-size:12px;color:var(--mut);margin-bottom:14px}
.bl{font-size:11px;font-weight:800;letter-spacing:.14em;color:var(--mut);text-transform:uppercase;margin:12px 0 8px}
.sw{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.sw button{border:2px solid transparent;border-radius:12px;padding:0;cursor:pointer;overflow:hidden;background:none}
.sw button.on{border-color:var(--cyan)}
.sw .pv{height:44px;display:block}
.sw span{display:block;font-size:10.5px;color:var(--mut);padding:4px 0;background:rgba(5,7,13,.5)}
.lt{display:flex;gap:8px}
.lt button{flex:1;background:rgba(148,170,210,.07);border:1px solid var(--line);border-radius:11px;color:var(--ink);
font:600 12.5px 'Segoe UI';padding:10px 6px;cursor:pointer}
.lt button.on{border-color:var(--cyan);background:rgba(34,211,238,.12)}
#go{width:100%;margin-top:16px;background:linear-gradient(100deg,var(--blue),var(--cyan));border:0;border-radius:12px;
padding:13px;font:800 14px 'Segoe UI';color:#04101E;cursor:pointer}
</style>
</head>
<body>
<header><span style="font-size:17px">🕹️</span><b>ABU OFFICE</b>
<button id="cfg" onclick="bootShow()" aria-label="Настройки">⚙</button>
<span class="st" id="st"><i></i><span id="stt">проверяю движок…</span></span>
</header>
<div id="stage">
  <canvas id="cv" width="448" height="470"></canvas>
  <div id="boot">
    <div class="bcard">
      <h2>🕹️ ABU OFFICE</h2>
      <p>Выбери тон офиса и освещение — агенты уже на местах.</p>
      <div class="bl">Тон офиса</div>
      <div class="sw" id="sw"></div>
      <div class="bl">Освещение</div>
      <div class="lt" id="lt">
        <button data-l="day">☀️ День</button><button data-l="warm">🌇 Тепло</button><button data-l="night">🌙 Ночь</button>
      </div>
      <button id="go" onclick="bootGo()">▶ Войти в офис</button>
    </div>
  </div>
</div>
<div id="hud">
  <div id="chips">
    <button onclick="chip('Напиши пост про акцию на маникюр')">📣 Пост про акцию</button>
    <button onclick="chip('Клиент спрашивает: есть окно завтра после 18:00?')">💬 Ответ клиенту</button>
    <button onclick="chip('Запиши Анну на стрижку в субботу в 14:00')">📅 Записать клиента</button>
    <button onclick="chip('Сделай короткий отчёт: как прошёл день?')">📊 Отчёт за день</button>
  </div>
  <div id="row">
    <input id="task" placeholder="Дай задание агентам…" autocomplete="off">
    <button id="send" onclick="give()">▶</button>
  </div>
  <div id="log"><b>ABU OFFICE</b> · v2 iso · задания уходят в реальный движок FLOWBOX</div>
</div>
<script>
'use strict';
/* ============ CONFIG ============ */
var AGENT_URL='https://frosting-hydrated-paralyze.ngrok-free.dev';
var cv=document.getElementById('cv'), ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;
var SID=localStorage.getItem('office_sid')||('o'+Math.random().toString(36).slice(2,10));
localStorage.setItem('office_sid',SID);

/* ============ ISO ============ */
var GW=12, GH=14;                 // мир в тайлах
var HW=16, HH=8;                  // полудиагонали ромба
var OX=cv.width/2+16, OY=165;     // экранный центр сетки (0,0)
function I(x,y){return [Math.round(OX+(x-y)*HW), Math.round(OY+(x+y)*HH)];}
function poly(g,pts,c){g.fillStyle=c;g.beginPath();g.moveTo(pts[0][0],pts[0][1]);
 for(var i=1;i<pts.length;i++)g.lineTo(pts[i][0],pts[i][1]);g.closePath();g.fill();}
function diamond(g,x,y,w,d,c){poly(g,[I(x,y),I(x+w,y),I(x+w,y+d),I(x,y+d)],c);}
function up(p,h){return [p[0],p[1]-h];}
function box(g,x,y,w,d,h,cT,cL,cR){
 var p1=I(x,y),p2=I(x+w,y),p3=I(x+w,y+d),p4=I(x,y+d);
 poly(g,[up(p4,h),up(p3,h),p3,p4],cL);            // левая (фронт-левая) грань
 poly(g,[up(p2,h),up(p3,h),p3,p2],cR);            // правая грань
 poly(g,[up(p1,h),up(p2,h),up(p3,h),up(p4,h)],cT);// верх
}
function shade(hex,f){var n=parseInt(hex.slice(1),16),r=(n>>16)&255,g2=(n>>8)&255,b=n&255;
 r=Math.max(0,Math.min(255,Math.round(r*f)));g2=Math.max(0,Math.min(255,Math.round(g2*f)));b=Math.max(0,Math.min(255,Math.round(b*f)));
 return '#'+((1<<24)+(r<<16)+(g2<<8)+b).toString(16).slice(1);}
function box3(g,x,y,w,d,h,c){box(g,x,y,w,d,h,c,shade(c,.72),shade(c,.55));}

/* ============ THEMES ============ */
var THEMES={
 night:{nm:'Ночной', floorA:'#182236',floorB:'#141D2E',cab:'#1B2A45',kit:'#152538',lounge:'#20304E',
  wallL:'#26334E',wallR:'#2E3D5C',win:'#0B1730',desk:'#7A5A3A',part:'#2FB6C9',sofa:'#3D5A9E',
  outdoor:'#070B14',label:'rgba(160,175,200,.95)',accent:'#22D3EE',counter:'#33415F'},
 warm:{nm:'Тёплый', floorA:'#DCCBA8',floorB:'#D2C09B',cab:'#C9B astronomicalX'.slice(0,7),kit:'#E3D5B5',lounge:'#D8C1A2',
  wallL:'#A89A8A',wallR:'#BCAe9C'.replace('e','E'),win:'#BFE3F5',desk:'#9A6B42',part:'#C97B4A',sofa:'#C0392B',
  outdoor:'#3A332A',label:'rgba(58,46,34,.95)',accent:'#E8843C',counter:'#B59A72'},
 light:{nm:'Бирюза', floorA:'#EDF0F4',floorB:'#E3E8EE',cab:'#DDE6F0',kit:'#E8F3F5',lounge:'#D8ECEF',
  wallL:'#8FA0B5',wallR:'#A5B4C8',win:'#CBEFF7',desk:'#8FA4BC',part:'#3FB4C4',sofa:'#3FB4C4',
  outdoor:'#41506B',label:'rgba(42,52,66,.95)',accent:'#2FB6C9',counter:'#C7D3E0'},
 game:{nm:'GameDev', floorA:'#1E1826',floorB:'#191420',cab:'#2A1E33',kit:'#231A2E',lounge:'#2E1F3A',
  wallL:'#B65A4A',wallR:'#5A6FB0',win:'#0D0A18',desk:'#B07030',part:'#7C3AED',sofa:'#E8843C',
  outdoor:'#0A0812',label:'rgba(220,205,240,.95)',accent:'#F472B6',counter:'#3A2C56'}
};
THEMES.warm.cab='#CFBF9E'; THEMES.warm.wallR='#BCAE9C';
var LIGHTS={day:null, warm:'rgba(255,150,60,.10)', night:'rgba(15,30,90,.30)'};
var themeId=localStorage.getItem('office_theme2')||'night';
var lightId=localStorage.getItem('office_light')||'night';
if(!THEMES[themeId])themeId='night';
var TH=THEMES[themeId];

/* ============ LAYOUT (grid) ============ */
var CABZ={x:0,y:0,w:3.6,d:3.6};                      // кабинет админа (дальний угол)
var CABDOOR={x:2.6,y:4.1};
var DESKS={ book:{x:4.6,y:4.6}, cnt:{x:7.8,y:4.6}, ana:{x:4.6,y:8.2}, rec:{x:7.6,y:11.0} };
var ADESK={x:0.7,y:1.2};
var COFFEE={x:9.2,y:0.5}, FRIDGE={x:10.9,y:0.15}, COOLER={x:0.4,y:9.6};
var SOFA={x:9.6,y:12.2}, LTAB={x:9.9,y:10.9};
var ENTR={x:11.2,y:13.2};                            // вход (передний угол)
var LANE=7.0;                                        // главный коридор (grid y)
var AGENTS=[
 {id:'rec', nm:'Лия',  role:'ресепшн',   shirt:'#2FB6C9', hair:'#7A4A2B', style:'f', desk:DESKS.rec},
 {id:'book',nm:'Макс', role:'запись',    shirt:'#4F7CFF', hair:'#20180F', style:'m', desk:DESKS.book},
 {id:'cnt', nm:'Ника', role:'контент',   shirt:'#F472B6', hair:'#57301A', style:'f', desk:DESKS.cnt},
 {id:'ana', nm:'Дан',  role:'аналитика', shirt:'#FBBF24', hair:'#111',    style:'m', desk:DESKS.ana}
];

/* ============ STATIC BG ============ */
var bg=document.createElement('canvas'); bg.width=cv.width; bg.height=cv.height;
function paintBG(){
 var g=bg.getContext('2d'); g.imageSmoothingEnabled=false;
 g.fillStyle=TH.outdoor; g.fillRect(0,0,bg.width,bg.height);
 // пол
 for(var y=0;y<GH;y++)for(var x=0;x<GW;x++)diamond(g,x,y,1,1,((x+y)%2?TH.floorA:TH.floorB));
 // зоны
 diamond(g,CABZ.x,CABZ.y,CABZ.w,CABZ.d,TH.cab);
 diamond(g,8.6,0,3.4,2.2,TH.kit);
 diamond(g,9.2,10.4,2.8,3.6,TH.lounge);
 diamond(g,10.6,12.6,1.4,1.4,shade(TH.lounge,.85));   // коврик у входа
 // задние стены (высота 78)
 var WH=78;
 box(g,0,-0.28,GW,0.28,WH,shade(TH.wallL,1.12),TH.wallL,shade(TH.wallL,.8)); // стена вдоль y=0
 box(g,-0.28,0,0.28,GH,WH,shade(TH.wallR,1.12),shade(TH.wallR,.9),TH.wallR); // стена вдоль x=0
 // окна на левой стене (плоскость y=0)
 for(var wx=4;wx<GW-1;wx+=2.6){
  var a=up(I(wx,0),WH-12), b=up(I(wx+1.6,0),WH-12), c2=up(I(wx+1.6,0),22), d2=up(I(wx,0),22);
  poly(g,[a,b,c2,d2],TH.win);
  poly(g,[up(I(wx,0),WH-30),up(I(wx+1.6,0),WH-30),up(I(wx+1.6,0),WH-34),up(I(wx,0),WH-34)],'rgba(255,255,255,.25)');
 }
 // доска на правой стене (плоскость x=0)
 var b1=up(I(0,4.4),WH-16),b2=up(I(0,7.0),WH-16),b3=up(I(0,7.0),26),b4=up(I(0,4.4),26);
 poly(g,[b1,b2,b3,b4],'#EDF2F8');
 poly(g,[up(I(0,4.7),WH-28),up(I(0,5.6),WH-28),up(I(0,5.6),WH-33),up(I(0,4.7),WH-33)],'#4F7CFF');
 poly(g,[up(I(0,5.9),WH-30),up(I(0,6.6),WH-30),up(I(0,6.6),WH-34),up(I(0,5.9),WH-34)],'#F472B6');
 poly(g,[up(I(0,4.7),WH-40),up(I(0,6.3),WH-40),up(I(0,6.3),WH-44),up(I(0,4.7),WH-44)],'#34D399');
 // часы на левой стене
 var cx=I(2.2,0);poly(g,[up(cx,WH-14),up(I(2.9,0),WH-14),up(I(2.9,0),WH-26),up(cx,WH-26)],'#E8EDF6');
 // вывеска ВХОД
 g.font='bold 8px monospace';g.fillStyle=TH.label;g.textAlign='center';
 var ep=I(ENTR.x+0.7,ENTR.y+1.4); g.fillText('ВХОД',ep[0],ep[1]+14);
 var kp=I(1.8,2.6); g.fillText('КАБИНЕТ',kp[0],kp[1]+3);
}

/* ============ FURNITURE (динамич. сортировка) ============ */
function deskDraw(g,d,on,wide){
 var w=wide?2.2:1.8;
 box3(g,d.x,d.y,w,0.9,20,TH.desk);
 // монитор
 var m=up(I(d.x+w/2,d.y+0.45),20);
 g.fillStyle='#0A0F1B'; g.fillRect(m[0]-9,m[1]-16,18,13);
 g.fillStyle=on?TH.accent:'#1A2233'; g.fillRect(m[0]-7,m[1]-14,14,9);
 if(on){g.fillStyle='#0A0F1B';var t=Math.floor(now/150)%4;for(var i=0;i<3;i++)g.fillRect(m[0]-6,m[1]-13+i*3,4+((i+t)%3)*3,1);}
 g.fillStyle='#0A0F1B'; g.fillRect(m[0]-2,m[1]-4,4,4);
}
var FURN=[
 {x:ADESK.x+1,y:ADESK.y+0.5,draw:function(g){deskDraw(g,ADESK,admin.state==='work',true);}},
 {x:DESKS.book.x+0.9,y:DESKS.book.y+0.45,draw:function(g){deskDraw(g,DESKS.book,byId('book').state==='work');}},
 {x:DESKS.cnt.x+0.9, y:DESKS.cnt.y+0.45, draw:function(g){deskDraw(g,DESKS.cnt, byId('cnt').state==='work');}},
 {x:DESKS.ana.x+0.9, y:DESKS.ana.y+0.45, draw:function(g){deskDraw(g,DESKS.ana, byId('ana').state==='work');}},
 {x:DESKS.rec.x+0.9, y:DESKS.rec.y+0.45, draw:function(g){deskDraw(g,DESKS.rec, byId('rec').state==='work');}},
 // перегородки между столами (как в референсе)
 {x:6.9,y:5.0,draw:function(g){box3(g,6.8,4.4,0.22,2.2,30,TH.part);}},
 {x:5.5,y:7.4,draw:function(g){box3(g,4.4,7.3,2.2,0.22,30,TH.part);}},
 // стены кабинета (внутренние, пониже)
 {x:CABZ.w+0.1,y:2,draw:function(g){box3(g,CABZ.w,0,0.24,2.4,56,TH.wallR);}},
 {x:1.2,y:CABZ.d+0.1,draw:function(g){box3(g,0,CABZ.d,2.2,0.24,56,TH.wallL);}},
 // кухня
 {x:9.6,y:0.9,draw:function(g){box3(g,8.8,0.1,1.9,0.75,26,TH.counter);
   box3(g,9.0,0.2,0.55,0.5,12,'#3B2A1E'); var p=up(I(9.3,0.45),38);g.fillStyle=TH.accent;g.fillRect(p[0]-2,p[1],4,4);}},
 {x:FRIDGE.x+0.5,y:FRIDGE.y+0.4,draw:function(g){box3(g,FRIDGE.x,FRIDGE.y,0.85,0.75,50,'#DDE4EC');
   var p=up(I(FRIDGE.x+0.42,FRIDGE.y+0.75),30);g.fillStyle='#9AA6B5';g.fillRect(p[0]-1,p[1],2,10);}},
 // кулер
 {x:COOLER.x+0.3,y:COOLER.y+0.3,draw:function(g){box3(g,COOLER.x,COOLER.y,0.6,0.6,26,'#BFD9EA');
   var p=up(I(COOLER.x+0.3,COOLER.y+0.3),40);g.fillStyle='#E9F4FB';g.fillRect(p[0]-4,p[1],8,14);}},
 // лаунж
 {x:SOFA.x+1.1,y:SOFA.y+0.45,draw:function(g){box3(g,SOFA.x,SOFA.y,2.2,0.9,16,TH.sofa);
   box3(g,SOFA.x,SOFA.y-0.28,2.2,0.28,30,shade(TH.sofa,.85));}},
 {x:LTAB.x+0.4,y:LTAB.y+0.4,draw:function(g){box3(g,LTAB.x,LTAB.y,0.8,0.8,12,shade(TH.desk,1.1));}},
 // растения
 plant(3.4,12.6), plant(11.2,3.2), plant(0.4,12.8), plant(8.4,3.4)
];
function plant(x,y){return {x:x+0.3,y:y+0.3,draw:function(g){
 box3(g,x,y,0.55,0.55,10,'#7A4A2B');
 var p=up(I(x+0.28,y+0.28),12);
 g.fillStyle='#2F9E5F';g.fillRect(p[0]-6,p[1]-14,12,14);
 g.fillStyle='#1E7A45';g.fillRect(p[0]-3,p[1]-11,6,8);}};}

/* ============ CHARACTERS ============ */
function mkChar(o){var d=o.desk||DESKS.rec;
 return Object.assign({gx:d.x+0.9,gy:d.y-0.35,frame:Math.random()*100,q:[],state:'sit',
  bub:null,bubT:0,working:false,sleep:false,kind:'human',tie:false},o)}
var admin=mkChar({id:'adm',nm:'АДМИН',shirt:'#EAEEF6',hair:'#111',style:'m',tie:true,desk:ADESK});
admin.gx=ADESK.x+1.1;admin.gy=ADESK.y-0.35;
var chars=[admin].concat(AGENTS.map(mkChar));
var oska=mkChar({id:'oska',nm:'Ося',role:'стажёр',shirt:'#8B8FA3',hair:'#6B3F23',style:'m',desk:{x:2.0,y:10.5}});
oska.state='idle'; oska.gx=2.4; oska.gy=10.8; chars.push(oska);
function byId(id){for(var i=0;i<chars.length;i++)if(chars[i].id===id)return chars[i];return chars[1];}
var guest=null;

function drawChibi(g,c){
 var s=I(c.gx,c.gy), x=s[0], y=s[1]-4, f=Math.floor(c.frame/9)%2, sit=(c.state==='sit'||c.state==='work');
 g.fillStyle='rgba(0,0,0,.25)'; g.beginPath(); g.ellipse?g.ellipse(x,s[1]+2,7,3,0,0,7):g.fillRect(x-6,s[1],12,3); g.fill&&g.fill();
 if(!sit){g.fillStyle='#22252E';g.fillRect(x-4,y+2,3,4+(f?1:0));g.fillRect(x+1,y+2,3,5-(f?1:0));}
 if(c.kind==='peng'){g.fillStyle='#1E2430';g.fillRect(x-4,y-6,8,(sit?7:8));g.fillStyle='#F2F5FB';g.fillRect(x-2,y-4,4,5);}
 else{g.fillStyle=c.shirt;g.fillRect(x-4,y-6,8,(sit?7:8));
  if(c.tie){g.fillStyle='#22D3EE';g.fillRect(x-1,y-5,2,5);}
  if(c.kind==='tiger'){g.fillStyle='#E8843C';g.fillRect(x-1,y-5,2,5);}
  g.fillStyle=c.shirt;g.fillRect(x-6,y-5+(c.state==='work'?(f?1:0):0),2,4);g.fillRect(x+4,y-5+(c.state==='work'?(f?0:1):0),2,4);}
 if(c.kind==='tiger'){
  g.fillStyle='#E8843C';g.fillRect(x-6,y-17,12,10);g.fillRect(x-7,y-18,3,3);g.fillRect(x+4,y-18,3,3);
  g.fillStyle='#F6C79A';g.fillRect(x-3,y-11,6,4);
  g.fillStyle='#2A1A0C';g.fillRect(x-5,y-16,2,1);g.fillRect(x-1,y-17,2,1);g.fillRect(x+3,y-16,2,1);
  g.fillStyle='#111';g.fillRect(x-3,y-14,2,2);g.fillRect(x+1,y-14,2,2);g.fillRect(x-1,y-10,2,1);
 }else if(c.kind==='peng'){
  g.fillStyle='#1E2430';g.fillRect(x-6,y-17,12,10);
  g.fillStyle='#F2F5FB';g.fillRect(x-4,y-15,8,7);
  g.fillStyle='#F0A030';g.fillRect(x-1,y-11,3,2);
  g.fillStyle='#111';g.fillRect(x-3,y-14,2,2);g.fillRect(x+1,y-14,2,2);
 }else{
  g.fillStyle='#E8B48C';g.fillRect(x-5,y-16,10,9);
  g.fillStyle=c.hair;g.fillRect(x-5,y-18,10,4);
  if(c.style==='f'){g.fillRect(x-6,y-16,2,8);g.fillRect(x+4,y-16,2,8);}
  else g.fillRect(x-5,y-15,2,2);
  if(c.style==='cap'){g.fillStyle='#C0392B';g.fillRect(x-5,y-19,10,3);g.fillRect(x-7,y-17,3,2);}
  g.fillStyle='#111';g.fillRect(x-3,y-13,2,2);g.fillRect(x+1,y-13,2,2);
  g.fillStyle='rgba(240,120,120,.5)';g.fillRect(x-5,y-11,2,1);g.fillRect(x+3,y-11,2,1);
 }
 if(c.sleep)bubble(g,x,y-22,'💤');
 else if(c.bub&&now<c.bubT)bubble(g,x,y-22,c.bub);
 g.font='7px monospace';g.fillStyle=TH.label;g.textAlign='center';
 g.fillText(c.nm,x,s[1]+13);
}
function bubble(g,x,y,t){g.font='9px "Segoe UI Emoji",monospace';var w=Math.min(g.measureText(t).width+8,170);
 var bx=Math.max(4,Math.min(cv.width-w-4,x-w/2));
 g.fillStyle='rgba(244,247,252,.96)';g.fillRect(bx,y-11,w,13);g.fillRect(x-2,y+2,4,3);
 g.fillStyle='#0A0F1B';g.textAlign='center';g.fillText(t,bx+w/2,y-1);}
function say(c,t,ms){c.bub=t;c.bubT=now+(ms||2400);}

/* ============ ROUTING (grid) ============ */
function inCab(x,y){return x<CABZ.w+0.2&&y<CABZ.d+0.2;}
function route(c,tx,ty){var p=[];
 var cx=c.gx,cy=c.gy;
 if(inCab(cx,cy)&&!inCab(tx,ty)){p.push([CABDOOR.x,CABDOOR.y]);cx=CABDOOR.x;cy=CABDOOR.y;}
 if(!inCab(cx,cy)&&inCab(tx,ty)){p.push([cx,LANE]);p.push([CABDOOR.x,LANE]);p.push([CABDOOR.x,CABDOOR.y]);p.push([tx,ty]);return p;}
 p.push([cx,LANE]);p.push([tx,LANE]);p.push([tx,ty]);return p;}
function walkTo(c,tx,ty,done){c.q.push({t:'walk',p:route(c,tx,ty),done:done});}
function sitPos(d,wide){return [d.x+(wide?1.1:0.9), d.y-0.35];}
function wait(c,ms,done){c.q.push({t:'wait',ms:ms,done:done})}
function setState(c,s,done){c.q.push({t:'state',s:s,done:done})}

/* ============ LOOP ============ */
var now=0,last=0,online=null;
function tick(ts){now=ts;var dt=Math.min(32,ts-last||16);last=ts;
 chars.forEach(function(c){step(c,dt)});
 if(guest)step(guest,dt);
 render(); requestAnimationFrame(tick);}
function step(c,dt){c.frame+=dt/16;
 var a=c.q[0];
 if(!a){if(c.state==='walk')c.state='idle';idleAI(c);return;}
 if(a.t==='walk'){c.state='walk';var tgt=a.p[0],sp=0.0022*dt;
  var dx=tgt[0]-c.gx,dy=tgt[1]-c.gy,d=Math.hypot(dx,dy);
  if(d<sp){c.gx=tgt[0];c.gy=tgt[1];a.p.shift();
   if(!a.p.length){c.q.shift();c.state='idle';a.done&&a.done();}}
  else{c.gx+=dx/d*sp;c.gy+=dy/d*sp;}}
 else if(a.t==='wait'){a.ms-=dt;if(a.ms<=0){c.q.shift();a.done&&a.done();}}
 else if(a.t==='state'){c.state=a.s;c.q.shift();a.done&&a.done();}}
function idleAI(c){
 if(c===guest)return;
 if(c.q.length||c.working||c.sleep)return;
 if(!c._next)c._next=now+3000+Math.random()*8000;
 if(now<c._next)return; c._next=now+6000+Math.random()*11000;
 var wide=(c===admin), dp=sitPos(c.desk,wide), r=Math.random();
 if(c===admin){ if(r<0.75){walkTo(c,dp[0],dp[1]);setState(c,'sit');}
  else{walkTo(c,1.5,2.8);wait(c,700);walkTo(c,dp[0],dp[1]);setState(c,'sit');} return;}
 if(c===oska){ walkTo(c,1.5+Math.random()*8,LANE+ (Math.random()*4-2)); wait(c,900); return;}
 if(r<0.42){walkTo(c,dp[0],dp[1]);setState(c,'sit');}
 else if(r<0.62){var s=c;walkTo(c,9.4,1.6,function(){say(s,'☕')});wait(c,1500);walkTo(c,dp[0],dp[1]);setState(c,'sit');}
 else if(r<0.76){var s2=c;walkTo(c,COOLER.x+0.9,COOLER.y+0.4,function(){say(s2,'💧')});wait(c,1200);walkTo(c,dp[0],dp[1]);setState(c,'sit');}
 else{walkTo(c,2+Math.random()*8,LANE);wait(c,800);}
}
/* посетители 🐯🐧📦 */
var GUESTS=[
 {nm:'Тигр',kind:'tiger',shirt:'#2C3A52'},
 {nm:'Пингви',kind:'peng',shirt:'#1E2430'},
 {nm:'Пит',kind:'human',shirt:'#C0392B',hair:'#20180F',style:'cap',bub:'📦'}
];
function spawnGuest(){
 if(guest)return;
 var t=GUESTS[Math.floor(Math.random()*GUESTS.length)];
 guest=mkChar({id:'g',nm:t.nm,shirt:t.shirt,hair:t.hair||'#111',style:t.style||'m',kind:t.kind,desk:DESKS.rec});
 guest.gx=ENTR.x+1.4; guest.gy=ENTR.y+1.2; guest.state='walk';
 walkTo(guest,DESKS.rec.x+2.4,DESKS.rec.y+0.6,function(){
  say(guest,t.bub||'💬 Хочу записаться!'); say(byId('rec'),'✍️ Секунду!',2000);});
 wait(guest,3600);
 walkTo(guest,ENTR.x+1.4,ENTR.y+1.2,function(){guest=null;});
}
setInterval(function(){ if(Math.random()<0.55) spawnGuest(); },26000);

/* ============ RENDER ============ */
function render(){
 ctx.clearRect(0,0,cv.width,cv.height); ctx.drawImage(bg,0,0);
 var items=[];
 FURN.forEach(function(f){items.push({d:f.x+f.y,draw:f.draw});});
 var all=chars.slice(); if(guest)all.push(guest);
 all.forEach(function(c){items.push({d:c.gx+c.gy,draw:function(g){drawChibi(g,c)}});});
 items.sort(function(a,b){return a.d-b.d}).forEach(function(it){it.draw(ctx)});
 var L=LIGHTS[lightId];
 if(L){ctx.fillStyle=L;ctx.fillRect(0,0,cv.width,cv.height);}
 if(online===false){ctx.fillStyle='rgba(4,7,15,.55)';ctx.fillRect(0,0,cv.width,cv.height);
  ctx.font='bold 11px monospace';ctx.fillStyle='#FBBF24';ctx.textAlign='center';
  ctx.fillText('ДВИЖОК СПИТ',cv.width/2,60);
  ctx.fillText('включи пульт (agent-on)',cv.width/2,76);}
}

/* ============ ENGINE ============ */
function hStatus(on){online=on;var st=document.getElementById('st');
 st.className='st'+(on?' on':'');
 document.getElementById('stt').textContent=on?'движок онлайн':'движок спит';
 chars.forEach(function(c){c.sleep=!on&&!c.working;});}
function health(){fetch(AGENT_URL+'/health',{headers:{'ngrok-skip-browser-warning':'1'},signal:AbortSignal.timeout(4000)})
 .then(function(r){return r.json()}).then(function(j){hStatus(!!(j&&j.ok&&j.llm))})
 .catch(function(){hStatus(false)});}
setInterval(health,60000);

function pickAgent(t){t=t.toLowerCase();
 if(/запис|запиш|окно|book|время|слот/.test(t))return byId('book');
 if(/пост|контент|видео|текст|стор|акци|промо|реклам/.test(t))return byId('cnt');
 if(/отч[её]т|аналит|цифр|стат|итог|день прош/.test(t))return byId('ana');
 return byId('rec');}
function log(who,txt,me){var l=document.getElementById('log');
 l.innerHTML+='\n'+(me?'<span class="me">🧑 '+esc(txt)+'</span>':'<b>'+who+':</b> '+esc(txt));
 l.scrollTop=l.scrollHeight;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')}
function chip(t){document.getElementById('task').value=t;give();}
var busy=false;
function give(){var inp=document.getElementById('task'),t=inp.value.trim();
 if(!t||busy)return; inp.value=''; busy=true;
 var ag=pickAgent(t); log('',t,true);
 ag.sleep=false; admin.sleep=false; ag.working=true;
 admin.q.length=0; ag.q.length=0; admin.working=true;
 var admHome=sitPos(ADESK,true), agDesk=sitPos(ag.desk,false);
 walkTo(admin,ag.gx-0.9,ag.gy+0.3,function(){say(admin,'📋 Задание!');say(ag,'Принял!',1700);});
 wait(admin,1500,function(){admin.working=false;});
 walkTo(admin,admHome[0],admHome[1]); setState(admin,'sit');
 wait(ag,1700);
 walkTo(ag,agDesk[0],agDesk[1]);
 setState(ag,'work');
 fetch(AGENT_URL+'/chat',{method:'POST',
  headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'1'},
  body:JSON.stringify({message:t,sessionId:'office-'+SID,business:'flowbox'}),
  signal:AbortSignal.timeout(60000)})
 .then(function(r){return r.json()})
 .then(function(j){finish(ag, j&&j.reply?j.reply:null)})
 .catch(function(){finish(ag,null)});
}
function finish(ag,reply){
 var t0=now;
 (function waitDone(){ if(ag.state!=='work'&&now-t0<9000){setTimeout(waitDone,300);return;}
  ag.working=false; ag.state='sit'; ag.q.length=0;
  if(reply){say(ag,'✅ Готово!',2800); log(ag.nm+' ('+ag.role+')',reply);}
  else{say(ag,'😴 Движок офлайн',2800);
   log(ag.nm,'Не достучался до движка. Включи пульт (agent-on.ps1) — и всё сделаю.');
   hStatus(false);}
  busy=false; })();
}
document.getElementById('task').addEventListener('keydown',function(e){if(e.key==='Enter')give()});

/* ============ BOOT ============ */
function bootShow(){document.getElementById('boot').classList.remove('hide');bootPaint();}
function bootPaint(){
 var sw=document.getElementById('sw'); sw.innerHTML='';
 Object.keys(THEMES).forEach(function(k){var t=THEMES[k];
  var b=document.createElement('button'); if(k===themeId)b.className='on';
  b.innerHTML='<span class="pv" style="background:linear-gradient(135deg,'+t.floorA+' 40%,'+t.desk+' 40% 70%,'+t.accent+' 70%)"></span><span>'+t.nm+'</span>';
  b.onclick=function(){themeId=k;bootPaint();};
  sw.appendChild(b);});
 document.querySelectorAll('#lt button').forEach(function(b){
  b.classList.toggle('on',b.dataset.l===lightId);
  b.onclick=function(){lightId=b.dataset.l;bootPaint();};});
}
function bootGo(){
 localStorage.setItem('office_theme2',themeId);
 localStorage.setItem('office_light',lightId);
 TH=THEMES[themeId]; paintBG();
 document.getElementById('boot').classList.add('hide');
}
paintBG(); bootPaint();
if(localStorage.getItem('office_theme2')){document.getElementById('boot').classList.add('hide');}
chars.forEach(function(c){c.state='sit'});
health();
requestAnimationFrame(tick);
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}
</script>
